{% extends 'accounts/base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Add Student</h2>

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                class="btn btn-primary">

                Save Student

            </button>

        </form>

    </div>

</div>

{% endblock %}
