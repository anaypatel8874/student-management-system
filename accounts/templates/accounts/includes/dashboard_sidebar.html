<aside class="sidebar">

    <a class="logo" href="{% url 'dashboard' %}">
        <span class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></span>
        <span>
            <strong>SMS</strong>
            <small>Student Panel</small>
        </span>
    </a>

    <nav class="sidebar-menu" aria-label="Dashboard navigation">
        <a class="{% if active_page == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
        </a>
        <a class="{% if active_page == 'students' %}active{% endif %}" href="{% url 'students_page' %}">
            <i class="fa-solid fa-user-graduate"></i>
            <span>Students</span>
        </a>
        <a class="{% if active_page == 'teachers' %}active{% endif %}" href="{% url 'teachers_page' %}">
            <i class="fa-solid fa-chalkboard-user"></i>
            <span>Teachers</span>
        </a>
        <a class="{% if active_page == 'courses' %}active{% endif %}" href="{% url 'courses_page' %}">
            <i class="fa-solid fa-book-open"></i>
            <span>Courses</span>
        </a>
        <a class="{% if active_page == 'reports' %}active{% endif %}" href="{% url 'reports_page' %}">
            <i class="fa-solid fa-chart-line"></i>
            <span>Reports</span>
        </a>
        <a class="{% if active_page == 'settings' %}active{% endif %}" href="{% url 'settings_page' %}">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </a>
        <a href="{% url 'admin:index' %}">
            <i class="fa-solid fa-user-tie"></i>
            <span>Admin Panel</span>
        </a>
    </nav>

    <form class="logout-form" method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="logout-link" type="submit">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
        </button>
    </form>

</aside>
